services:
  postgres:
    image: postgres:16-alpine
    container_name: cripto-postgres
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - cripto-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: cripto-backend
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      FLASK_APP: app.py
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "flask db upgrade && flask seed-admin && gunicorn --workers=2 --bind=0.0.0.0:5000 --timeout=60 --access-logfile=- app:app"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - cripto-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: cripto-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - cripto-network

volumes:
  postgres_data:
  uploads_data:

networks:
  cripto-network:
    driver: bridge
