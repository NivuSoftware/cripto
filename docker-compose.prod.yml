services:
  postgres:
    image: postgres:16-alpine
    container_name: cripto-postgres
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - cripto-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: cripto-backend
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      FLASK_APP: app.py
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "flask db upgrade && flask seed-admin && gunicorn --workers=2 --bind=0.0.0.0:5000 --timeout=60 --access-logfile=- app:app"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/blog-posts/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    networks:
      - cripto-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_SITE_URL: ${VITE_SITE_URL:-https://hablemoscripto.com}
    container_name: cripto-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certificados SSL generados por Certbot en el host
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - cripto-network

volumes:
  postgres_data:
  uploads_data:

networks:
  cripto-network:
    driver: bridge
