services:
  postgres:
    image: postgres:16-alpine
    container_name: cripto-postgres
    environment:
      POSTGRES_DB: cripto_db
      POSTGRES_USER: cripto_user
      POSTGRES_PASSWORD: cripto_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cripto_user -d cripto_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - cripto-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cripto-backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: app.py
      DATABASE_URL: postgresql+psycopg2://cripto_user:cripto_password@postgres:5432/cripto_db
    volumes:
      - ./backend:/app
    command: >
      sh -c "flask db upgrade && flask seed-admin && python app.py"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - cripto-network

  cripto_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cripto-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - WATCHPACK_POLLING=true
    command:
      [
        "sh",
        "-c",
        "npm install && (chmod +x node_modules/.bin/vite node_modules/esbuild/bin/esbuild node_modules/@esbuild/linux-x64/bin/esbuild 2>/dev/null || true) && npm run dev",
      ]
    depends_on:
      - backend
    networks:
      - cripto-network

volumes:
  postgres_data:
networks:
  cripto-network:
    driver: bridge
