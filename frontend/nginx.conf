# Redireccion HTTP -> HTTPS
server {
    listen 80;
    server_name hablemoscripto.com www.hablemoscripto.com;
    return 301 https://hablemoscripto.com$request_uri;
}

# HTTPS principal
server {
    listen 443 ssl;
    server_name hablemoscripto.com www.hablemoscripto.com;

    # Certificados SSL (generados por Certbot)
    ssl_certificate     /etc/letsencrypt/live/hablemoscripto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hablemoscripto.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-Frame-Options           "DENY"                       always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache agresivo para assets de Vite (tienen hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API al backend Flask
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy archivos subidos al backend
    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
